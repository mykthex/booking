name: Build And Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  REPO_NAME: ${{ github.event.repository.name }}
  OWNER: ${{ github.repository_owner }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      client_image: ${{ steps.images.outputs.client_image }}
      server_image: ${{ steps.images.outputs.server_image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image names
        id: images
        run: |
          echo "client_image=${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.REPO_NAME }}-client:${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "server_image=${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.REPO_NAME }}-server:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: |
            ${{ steps.images.outputs.server_image }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.REPO_NAME }}-server:latest

      - name: Build and push client image
        uses: docker/build-push-action@v6
        with:
          context: ./client
          file: ./client/Dockerfile
          build-args: |
            PUBLIC_API_BASE_URL=${{ secrets.PUBLIC_API_BASE_URL || 'http://localhost:8080' }}
          push: true
          tags: |
            ${{ steps.images.outputs.client_image }}
            ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.REPO_NAME }}-client:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          SERVER_IMAGE: ${{ needs.build-and-push.outputs.server_image }}
          CLIENT_IMAGE: ${{ needs.build-and-push.outputs.client_image }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          envs: SERVER_IMAGE,CLIENT_IMAGE
          script: |
            set -euo pipefail

            cd "${{ secrets.DEPLOY_PATH }}"
            git fetch origin main
            git checkout main
            git pull --ff-only origin main

            printf '%s\n' "${{ secrets.SERVER_ENV_FILE }}" > server/.env

            export SERVER_IMAGE="$SERVER_IMAGE"
            export CLIENT_IMAGE="$CLIENT_IMAGE"

            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u "${{ secrets.GHCR_USERNAME }}" --password-stdin
            docker compose -f docker-compose.yml -f deploy/docker-compose.prod.yml pull
            docker compose -f docker-compose.yml -f deploy/docker-compose.prod.yml up -d
            docker image prune -f
