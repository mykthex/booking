"""Exposes a URL that specifies the behavior of this scalar."""
directive @specifiedBy(
  """The URL that specifies the behavior of this scalar."""
  url: String!
) on SCALAR

"""
Indicates exactly one field must be supplied and this field must not be `null`.
"""
directive @oneOf on INPUT_OBJECT

type Booking {
  date: String
  player1Id: String
  player2Id: String
  player1: String
  player2: String
  courtId: String
  courtName: String
  hour: String
  paid: Boolean
  id: ID
}

type Court {
  id: ID
  name: String
  number: Int
  active: Boolean
  type: String
}

type Membership {
  name: String
  id: ID
  cost: Float
}

type Mutation {
  createBooking(userId: ID, player2Id: ID, courtId: ID, date: String, hour: Int, paid: Boolean): Booking
  updateBooking(id: ID!, player1Id: ID, player2Id: ID, courtId: ID, date: String, hour: Int, paid: Boolean): Booking
  createCourt(name: String!, number: Int!, type: String!, active: Boolean!): Court
  updateCourt(id: ID!, name: String, number: Int, type: String, active: Boolean): Court
  deleteBooking(id: ID!): Boolean
}

type Page {
  title: String
  description: String
  image: String
}

enum PageName {
  home
}

type Query {
  bookings(userId: ID): [Booking!]!
  user(id: ID!): User
  users: [User!]
  page(id: PageName!): Page
  courts: [Court!]!
  roles: [Role!]!
  memberships: [Membership!]!
}

type Role {
  id: ID
  name: String
}

type User {
  id: ID
  email: String
  name: String
  surname: String
  role: String
  membershipId: Int
  membership: String
}

