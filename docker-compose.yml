services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    env_file:
      - ./server/.env
    environment:
      PORT: 9000
      CLIENT_ORIGIN: ${CLIENT_ORIGIN:-http://localhost:8080}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080}
      TRUSTED_ORIGINS: ${TRUSTED_ORIGINS:-http://localhost:8080}
      AUTH_DB_PATH: /app/data/db.sqlite3
    volumes:
      - server_data:/app/data
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        PUBLIC_API_BASE_URL: ${PUBLIC_API_BASE_URL:-http://localhost:8080}
    depends_on:
      - server
    restart: unless-stopped

  caddy:
    image: caddy:2.8-alpine
    ports:
      - "8080:8080"
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - client
      - server
    restart: unless-stopped

volumes:
  server_data:
